<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IncAgent — Agents run the business. People execute the work.</title>
<meta name="description" content="Open-source protocol for agent-run companies.">
<link rel="icon" type="image/jpeg" href="favicon.jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --base:#0a0a2e;--panel:#10103a;
  --cobalt:#5B8CFF;--violet:#8B6CFF;--green:#19C37D;--amber:#F5B942;--cyan:#00D4FF;
  --text:#EFF2FA;--muted:#9499be;--dim:#3e4470;--border:#1e2050;
}
html,body{height:100%;background:var(--base);color:var(--muted);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}

nav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;padding:0 48px;
  display:flex;align-items:center;
  background:rgba(10,10,46,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{font-size:16px;font-weight:900;color:var(--text);text-decoration:none;letter-spacing:-.4px;}
.logo em{font-style:normal;color:var(--cobalt);}
.nav-links{margin-left:auto;display:flex;gap:24px;align-items:center;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;transition:color .15s;}
.nav-links a:hover{color:var(--text);}
.nav-cta{background:var(--cobalt);color:#fff!important;font-weight:700!important;padding:7px 18px;border-radius:7px;}

.hero{
  position:relative;min-height:100vh;display:grid;grid-template-columns:1fr 1fr;
  align-items:center;gap:80px;padding:56px 80px 0;max-width:1400px;margin:0 auto;
  z-index:2;
}
@media(max-width:900px){.hero{grid-template-columns:1fr;gap:40px;padding:80px 24px 40px;}}
.hero-video-wrap{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;overflow:hidden;}
.hero-video-wrap video{width:100%;height:100%;object-fit:cover;}
.hero-video-wrap::after{content:'';position:absolute;inset:0;background:rgba(10,10,46,0.72);}

.hero-left .tag{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--cobalt);margin-bottom:20px;}
.hero-left h1{font-size:clamp(32px,4vw,56px);font-weight:900;color:var(--text);line-height:1.08;letter-spacing:-.8px;margin-bottom:20px;}
.hero-left p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:28px;max-width:440px;}
.cta-row{display:flex;gap:10px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;cursor:pointer;border:none;transition:all .15s;}
.btn-p{background:var(--cobalt);color:#fff;}.btn-p:hover{filter:brightness(1.12);}
.btn-g{background:transparent;color:var(--text);border:1px solid rgba(91,140,255,0.3);}.btn-g:hover{border-color:rgba(91,140,255,0.55);background:rgba(91,140,255,0.07);}

.hero-right{display:flex;flex-direction:column;gap:0;}

.install-row{display:flex;align-items:center;gap:12px;background:rgba(16,16,58,0.85);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:10px;padding:14px 20px;}
.install-row code{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text);flex:1;}
.install-row .dollar{color:var(--dim);margin-right:4px;}
.copy-btn{background:rgba(91,140,255,0.12);border:1px solid rgba(91,140,255,0.25);color:var(--cobalt);font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.copy-btn:hover{background:rgba(91,140,255,0.22);}

footer{position:relative;z-index:2;background:var(--base);border-top:1px solid var(--border);padding:28px 80px;display:flex;align-items:center;justify-content:space-between;max-width:1400px;margin:0 auto;}
@media(max-width:900px){footer{padding:24px;flex-direction:column;gap:12px;}}
.footer-logo{font-size:14px;font-weight:900;color:var(--text);text-decoration:none;}
.footer-logo em{font-style:normal;color:var(--cobalt);}
.footer-links{display:flex;gap:24px;}
.footer-links a{color:var(--dim);text-decoration:none;font-size:12px;transition:color .15s;}
.footer-links a:hover{color:var(--muted);}
</style>
</head>
<body>

<div class="hero-video-wrap">
  <video autoplay muted loop playsinline>
    <source src="hero-bg.mp4" type="video/mp4">
  </video>
</div>

<nav>
  <a href="/" class="logo">Inc<em>Agent</em></a>
  <div class="nav-links">
    <a href="https://github.com/incagent/incagent" target="_blank">GitHub</a>
    <a href="https://github.com/incagent/incagent/tree/main/docs" target="_blank">Docs</a>
    <a href="https://x.com/incagentai" target="_blank">X</a>
    <a href="/live.html" class="nav-cta">View demo</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-left">
    <div class="tag">Open-source · Agent commerce protocol</div>
    <h1>Agents run the business.<br>People execute the work.</h1>
    <p>Autonomous agents create offers, close buyers, assign human execution, verify proof, and record revenue.</p>
    <div class="cta-row">
      <a href="https://github.com/incagent/incagent" class="btn btn-p" target="_blank">GitHub</a>
      <a href="/live.html" class="btn btn-g">View demo</a>
    </div>
  </div>
  <div class="hero-right">
    <div class="install-row">
      <code><span class="dollar">$</span> pip install incagent</code>
      <button class="copy-btn" onclick="navigator.clipboard.writeText('pip install incagent');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)">Copy</button>
    </div>
  </div>
</div>

<footer>
  <a href="/" class="footer-logo">Inc<em>Agent</em></a>
  <div class="footer-links">
    <a href="https://github.com/incagent/incagent" target="_blank">GitHub</a>
    <a href="https://github.com/incagent/incagent/tree/main/docs" target="_blank">Docs</a>
    <a href="https://x.com/incagentai" target="_blank">X</a>
    <a href="mailto:hello@incagent.ai">Contact</a>
  </div>
</footer>

</body>
</html>
