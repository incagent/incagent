同時回線の仕様
1つの050番号でプランの回線数まで同時受電可能（スタンダード=同じ番号に3件同時）
受電と架電で回線共有（受電1件通話中→架電は残り2回線）
050番号はプラン有効化時に自動付与（1番号）

通話制限
通常最大通話時間: 180秒（3分）デフォルト、設定で変更可
トライアル: 60秒上限
営業時間外: 600秒（10分）デフォルト、設定で変更可（60秒〜1800秒）
クレジット切れ時の挙動
通話中30秒ごとにクレジット残量チェック
残0以下→通話を強制切断（「クレジットを使い切りました」）
残10CR以下でLINE通知（「受電あと約○分」表示）
クレジット0→新規受電不可（checkAccess で CREDITS_EXHAUSTED）
営業時間外の挙動
営業時間外もAIが対応（切断しない）
転送は無効化される（AIのみ対応）
業務と関係ない会話はAIが判断して切断
最大通話時間は別設定（デフォルト10分）
受電機能
AI応答: ElevenLabs V3 Conversational AI
カスタムプロンプト: ダッシュボードから自由設定
転送: AI判断で担当者に電話転送（複数番号対応）
通知: LINE / SMS / メール / Slack / Chatwork / Teams
文字起こし: 全文保存（漢字変換済み）+ AI要約3行
録音: 自動保存・ダウンロード可
顧客DB連携: 電話番号で自動名前特定
ブラック/ホワイトリスト: 着信フィルター

架電機能
自動架電: CSVアップロード→一括発信
トークスクリプト: テンプレート or AI自動生成（業種別）
リアルタイム監視: 通話状況・文字起こしをブラウザで確認
結果分類: 予約/問合せ/コールバック/拒否/不在/留守電

月次更新の仕組み
Stripeサブスクのinvoice.paidで自動リセット
credits_used = 0 に戻る
新しいシリアルキーも再発行（バックアップ）
有効期限30日更新

導入・契約まわり
Q: 初期費用は？
→ 0円。月額のみ。いつでも解約OK。最低契約期間の縛りなし。

Q: 導入にどれくらいかかる？
→ 最短即日。登録→プラン購入→シリアルキー入力→050番号自動発行→プロンプト設定→完了。

Q: 既存の電話番号はそのまま使える？
→ 直接使えるわけではない。発行した050番号に転送設定する。NTTならボイスワープ（月550円）で142→転送先に050番号入力。

Q: 解約したらどうなる？
→ Stripeサブスク解約で次月更新なし。050番号はリリースされる。データ（通話履歴・録音）はDB上残る。

Q: プラン変更は？
→ ダッシュボードから上位プランに購入可能。ダウングレードは現状コード上は新プラン購入→旧プランは期限切れで自然失効の流れ。

トライアルまわり
Q: トライアルの制限は？
→ 50CR / 1回線 / 通話1回あたり60秒上限 / 050番号は共有番号（+815017260406）。有料プランで専用番号に切り替え。

Q: トライアル期間は？
→ コード上は trial_end に7日間セット（L2998）。ただしMEMORYには「無料30日間」記載あり → Stripe側orプロファイル作成時の設定による。ここは確認しておいたほうがいい。

クレジット・課金の突っ込みどころ
Q: クレジット使い切ったらどうなる？通話中に切れる？
→ 切れる。30秒ごとにチェック、残0で「クレジットを使い切りました」と言って強制切断。ただし残10CR以下でLINE通知が飛ぶので事前に追加購入できる。

Q: 不在・留守電の場合もクレジット消費する？
→ しない。no_answer / invalid_number / voicemail は0CR。

Q: 転送後の人間対応もクレジット消費？
→ する。ただし 0.15CR/分 で通常の約1/5。AI対応0.7CR/分と比べて大幅に安い。

Q: 月途中でプラン購入したら日割り？
→ 日割りなし。購入日から30日間有効。

Q: クレジット繰り越しは？
→ 繰り越しなし。月次更新（invoice.paid）で credits_used = 0 にリセットされる。追加パックで買ったクレジットも credits_total に加算されるが、月次リセット時にプラン定量に戻る。

技術的な突っ込み
Q: AIが変なこと言ったら？クレーム対応は？
→ 全通話の録音・文字起こしが残るので検証可能。プロンプトで制御。ただしAIの回答精度は100%保証できない。

Q: 通話品質は？遅延は？
→ ElevenLabs V3 + Twilio。遅延は体感0.5〜1秒程度。冒頭2秒のPauseでチャネル確立待ち→最初の挨拶が切れない対策済み。

Q: 同時に3件かかってきて4件目はどうなる？
→ Twilio側でbusy。発信者には話中音が流れる。現状コード上で「混雑中」ガイダンスは未実装。

Q: 録音データはどこに保存？
→ Supabase Storage。URLで再生・ダウンロード可。

Q: 対応言語は？
→ 日本語のみ。ElevenLabsダッシュボード側で日本語設定済み（コードからlanguage: 'ja'を入れるとイントネーション壊れる）。

機能面で聞かれそうなこと
Q: Google連携は？
→ Google Calendar + Meet自動作成実装済み。架電でアポ取れたら自動でMeetリンク生成。

Q: SMS自動返信は？
→ 実装済み。受電後にSMS自動返信（設定でON/OFF、メッセージカスタマイズ可）。

Q: LINE通知の内容は？
→ 着信通知【相手の名前/匿名】、電話番号、店舗名、対応結果、AI要約3行。

Q: 紹介制度は？
→ 実装済み。紹介コード自動生成、紹介実績表示、報酬は利用日数加算。

Q: 複数店舗対応は？
→ 現状1アカウント=1番号。複数店舗は別アカウントが必要。

競合比較で聞かれそうなこと
Q: IVR（自動音声応答）と何が違う？
→ IVRは「1を押してください」の固定分岐。ApoTrailは自然言語で会話して用件を理解し、転送・予約・折り返し対応まで自動。

Q: コールセンター代行と比べて？
→ スタンダード¥128,000で約2,857分（受電）≒ 人件費3人分（1人月30万×3=90万）の1/7以下。24時間対応、品質ブレなし、即日スケール。